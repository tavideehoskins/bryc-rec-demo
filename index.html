<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRYC — Personalized Recommendations</title>
    <link rel="icon" type="image/png" href="assets/bryc-logo-white.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Body = Open Sans (per brand). Headers/numbers = Proxima Nova in production
         (Adobe/Typekit license required); Montserrat is the closest free stand-in
         loaded here for the demo. TODO(brand): swap Montserrat → Proxima Nova kit. -->
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="main.css">
    <style>
      :root {
        --font-body: "Open Sans", system-ui, sans-serif;
        --font-head: "Proxima Nova", "Montserrat", system-ui, sans-serif;
      }
      body { font-family: var(--font-body); }
      h1, h2, h3, h4, .font-head, .tabular-nums { font-family: var(--font-head); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="js/main.js"></script>
</body>
</html>
